# Build ESTM for macOS when pushing to the `release` branch.
# Produces a .dmg on the workflow run (Artifacts) and attaches it to a GitHub Release.

name: Release macOS

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Read version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build Tauri bundle
        env:
          # Ad-hoc sign so Apple Silicon can launch the app (no Developer ID yet).
          APPLE_SIGNING_IDENTITY: "-"
        run: npm run tauri build -- --bundles dmg

      - name: Verify code signature
        run: |
          set -euo pipefail
          DMG=(src-tauri/target/release/bundle/dmg/*.dmg)
          MOUNT=/tmp/estm-dmg-mount
          hdiutil attach "${DMG[0]}" -mountpoint "$MOUNT" -nobrowse -quiet
          codesign --verify --deep --strict "$MOUNT/ESTM.app"
          hdiutil detach "$MOUNT" -quiet

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ESTM-${{ steps.version.outputs.version }}-macos
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-build.${{ github.run_number }}
          name: ESTM v${{ steps.version.outputs.version }} (build ${{ github.run_number }})
          files: src-tauri/target/release/bundle/dmg/*.dmg
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
